name: Update flake

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  bump-nix:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        app:
          - kharon
          - commodore
          # Add new apps here, one per line
      max-parallel: 1 # Jobs push to the same branch; run sequentially to avoid conflicts
      fail-fast: false # One app failing to update should not block the others
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }} # Branch tip, not trigger SHA — a previous matrix job may have pushed

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Bump Nix package version + hashes
        run: |
          nix-shell -p nix-update --run "nix-update --flake ${{ matrix.app }} --override-filename ${{ matrix.app }}.nix"

      - name: Build
        run: |
          nix build #{{ matrix.app }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "Bump ${{ matrix.app }} package"

  bump-lock:
    needs: bump-nix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }} # Branch tip, the bump-nix jobs may have pushed

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Bump flake.lock
        run: |
          nix flake update

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "Bump flake.lock"
